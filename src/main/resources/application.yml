server:
  port: 8080

spring:
  h2:
    console:
      enabled: true  # 웹에서 DB를 볼 수 있게 해줍니다.
      settings:
        web-allow-others: true # 외부 접속 허용 (로컬 테스트 시 편리)
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password: sa
  jpa:
    defer-datasource-initialization: true
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        '[format_sql]': true # SQL을 예쁘게 정렬해서 보여줌